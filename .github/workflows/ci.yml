name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The tests are stdlib-only and OS-agnostic; run them everywhere to keep the
    # Linux `watch`/state path honest, not just the macOS Spotify path.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Byte-compile everything
        run: python -m compileall -q bin src scripts

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - name: Lint
        run: ruff check .
      - name: Shellcheck the installer
        run: shellcheck install.sh
