# flow-state has no build step and no dependencies — this file exists only to
# pin the lint rules so CI and contributors agree.
[tool.ruff]
target-version = "py38"
line-length = 100

[tool.ruff.lint]
# Real-bug rules only. UP (pyupgrade) is deliberately off: the codebase uses
# %-formatting consistently, which is valid and readable; churning it to
# f-strings would be change for its own sake.
select = ["E", "F", "W", "I", "B"]
